<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Mycelium — groei vanuit letters</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #fff; }
      canvas { position: fixed; top: 0; left: 0; display: block; }
      #scroll-space { }
    </style>
  </head>
  <body>
    <div id="scroll-space"></div>
    <canvas id="c"></canvas>

    <script>
      // ── Mycelium — groei vanuit letters ───────────────────────────────────────
      //
      // 1. Letters worden zichtbaar als verbonden contourlijnen (leesbaar).
      // 2. Vanuit elke lettercoördinaat groeien dunne lijnen in willekeurige
      //    richtingen — zoals mycelium dat een substraat koloniseert.
      // 3. Alle lijnen zijn exact even dik (LINE_W).
      // 4. Na LETTER_SHOW_MS vervaagt de lettercontour; de groeijnen blijven.
      //
      // Architectuur:
      //   • Tendrils (groeijnen) bewaard in document-coördinaten.
      //   • Canvas-translate(-scrollY) zodat tendrils meebewegen met scrollen.
      //   • Offscreen-canvas accumuleert de getekende tendrils (geen herberekening).
      //   • Letterlaag wordt elke frame opnieuw over de offscreen getekend.

      const FONT_PATH  = "../fonts/nee.json";
      const Y_MAX      = 16, Y_MIN = -3, FONT_H = Y_MAX - Y_MIN;

      // ── Layout ────────────────────────────────────────────────────────────────
      const SCALE       = 4.5;
      const LINE_HEIGHT = Math.round(FONT_H * SCALE * 1.55);
      const MARGIN_X    = 72;
      const MARGIN_TOP  = 90;
      const SPACE_ADV   = 3;
      const TOTAL_LINES = 120;

      // ── Groeijnen ─────────────────────────────────────────────────────────────
      const LINE_W          = 0.8;    // uniforme lijndikte (px)
      const SPEED           = 0.9;    // px per frame
      const WOBBLE          = 0.055;  // hoekwiggle per stap (radians)
      const MAX_LEN_BASE    = 220;    // maximale tendril-lengte (varieert per tendril)
      const BRANCH_PROB     = 0.004;  // kans per frame om te vertakken
      const MAX_TENDRILS    = 10000;
      const TENDRILS_PER_PT = 1;      // tendrils per letterpunt bij geboorte

      // ── Letterlaag ────────────────────────────────────────────────────────────
      const LETTER_SHOW_MS = 4000;    // letter volledig zichtbaar
      const LETTER_FADE_MS = 2500;    // vervaagtijd daarna

      // ── Tekst ─────────────────────────────────────────────────────────────────
      const SOURCE =
        "nee dit is hoe wij groeien nee wij verbinden ons " +
        "nee dit is het netwerk nee wij verspreiden ons " +
        "nee wij koloniseren de ruimte nee groei is ons pad " +
        "nee verbinding is onze kracht nee samen worden wij sterker " +
        "nee het netwerk herinnert zich alles nee elke verbinding telt " +
        "nee wij zijn overal nee wij groeien door alles heen " +
        "nee de structuur leeft nee wij zijn het substraat " +
        "nee uit elke letter groeit een draad nee die draad verbindt " +
        "nee wij zijn de ruimte nee wij zijn de letter nee wij zijn het woord";

      // ── State ──────────────────────────────────────────────────────────────────
      let font = null, W, H, WORLD_H;
      let wrappedLines  = [];
      let lineBirthTime = {};   // lineIdx → ms
      let spawnedLines  = {};   // lineIdx → true (tendrils al gespawnd)
      let tendrils      = [];   // { path:[[wx,wy]...], angle, len, maxLen, growing }

      // Offscreen = wereldcanvas (accumuleert alle getekende tendrilsegmenten)
      let offscreen, offCtx;

      const canvas = document.getElementById("c");
      const ctx    = canvas.getContext("2d");

      // ── Font-helpers ──────────────────────────────────────────────────────────
      function gPts(l) {
        const g = font.glyphs[l];
        return !g ? [] : Array.isArray(g) ? g : (g.points ?? []);
      }
      function gLsb(l) {
        const g = font.glyphs[l];
        return !g ? 0 : (font.lsb?.[l] ?? (Array.isArray(g) ? 0 : (g.lsb ?? 0)));
      }
      function gAdv(l) {
        const g = font.glyphs[l];
        if (!g) return 0;
        const pts = gPts(l);
        const rsb = font.rsb?.[l] ?? (Array.isArray(g) ? 2 : (g.rsb ?? 2));
        return gLsb(l) + (pts.length ? Math.max(...pts.map(p => p[0])) : 0) + rsb;
      }

      // ── Woordafbreking ────────────────────────────────────────────────────────
      function buildWrappedLines() {
        const maxW = (W - MARGIN_X * 2) / SCALE;
        const words = SOURCE.split(" ");
        const lines = []; let cur = [], curW = 0;
        for (const word of words) {
          const ww = word.split("").reduce((s, c) => s + (font.glyphs[c] ? gAdv(c) : 0), 0);
          const needed = cur.length > 0 ? curW + SPACE_ADV + ww : ww;
          if (cur.length > 0 && needed > maxW) {
            lines.push(cur.join(" ")); cur = [word]; curW = ww;
          } else {
            if (cur.length > 0) curW += SPACE_ADV;
            curW += ww; cur.push(word);
          }
        }
        if (cur.length > 0) lines.push(cur.join(" "));
        wrappedLines = lines;
      }

      // ── Document-coördinaten ──────────────────────────────────────────────────
      function lineWorldY(li) {
        // baseline in documentruimte (onafhankelijk van scroll)
        return MARGIN_TOP + li * LINE_HEIGHT + Y_MAX * SCALE;
      }

      function lineScreenY(li, scrollY) {
        return lineWorldY(li) - scrollY;
      }

      // ── Tendrils spawnen vanuit lettercoördinaten ─────────────────────────────
      function spawnLine(li) {
        if (spawnedLines[li]) return;
        spawnedLines[li] = true;

        const text = wrappedLines[li % wrappedLines.length];
        if (!text) return;

        const by = lineWorldY(li);
        let cx = MARGIN_X;

        for (const ch of text) {
          if (!font.glyphs[ch]) { cx += SPACE_ADV * SCALE; continue; }
          const pts = gPts(ch), lsb = gLsb(ch);

          for (const [fx, fy] of pts) {
            const wx = cx + lsb * SCALE + fx * SCALE;
            const wy = by - fy * SCALE;

            for (let k = 0; k < TENDRILS_PER_PT; k++) {
              if (tendrils.length >= MAX_TENDRILS) break;
              tendrils.push({
                path:   [[wx, wy]],
                angle:  Math.random() * Math.PI * 2,
                len:    0,
                maxLen: MAX_LEN_BASE * (0.4 + Math.random() * 0.8),
                growing: true
              });
            }
          }
          cx += gAdv(ch) * SCALE;
        }
      }

      // ── Tendrils updaten + segmenten tekenen op offscreen ─────────────────────
      function updateAndDraw(scrollY) {
        offCtx.strokeStyle = "#1a1a1a";
        offCtx.lineWidth   = LINE_W;
        offCtx.lineCap     = "round";

        const toAdd = [];

        for (const t of tendrils) {
          if (!t.growing) continue;
          if (t.len >= t.maxLen) { t.growing = false; continue; }

          // Alleen groeien als zichtbaar in viewport (performance)
          const tipY = t.path[t.path.length - 1][1];
          if (tipY < scrollY - H || tipY > scrollY + 2 * H) continue;

          const prev = t.path[t.path.length - 1];

          // Wiggle
          t.angle += (Math.random() - 0.5) * WOBBLE * 2;

          const nx = prev[0] + Math.cos(t.angle) * SPEED;
          const ny = prev[1] + Math.sin(t.angle) * SPEED;

          // Teken nieuw segment op offscreen (wereldcoördinaten)
          offCtx.beginPath();
          offCtx.moveTo(prev[0], prev[1]);
          offCtx.lineTo(nx, ny);
          offCtx.stroke();

          t.path.push([nx, ny]);
          t.len += SPEED;

          // Vertakken
          if (
            t.len > 20 &&
            t.len < t.maxLen - 15 &&
            Math.random() < BRANCH_PROB &&
            tendrils.length + toAdd.length < MAX_TENDRILS
          ) {
            const bAngle = t.angle + (Math.random() < 0.5 ? 1 : -1) * (0.4 + Math.random() * 0.9);
            toAdd.push({
              path:   [[nx, ny]],
              angle:  bAngle,
              len:    0,
              maxLen: (t.maxLen - t.len) * (0.35 + Math.random() * 0.5),
              growing: true
            });
          }
        }

        for (const t of toAdd) tendrils.push(t);
      }

      // ── Lettercontouren tekenen (leesbaar, vervaagt na LETTER_SHOW_MS) ─────────
      function renderLetterLayer(scrollY, now) {
        ctx.save();
        ctx.translate(0, -scrollY);

        const first = Math.max(0, Math.floor((scrollY - MARGIN_TOP) / LINE_HEIGHT) - 1);
        const count = Math.ceil(H / LINE_HEIGHT) + 3;

        for (let i = 0; i < count; i++) {
          const li = first + i;
          if (li >= TOTAL_LINES || li >= wrappedLines.length) break;

          const birthT = lineBirthTime[li];
          if (birthT == null) continue;

          const age   = now - birthT;
          const alpha = Math.max(0, 1 - Math.max(0, age - LETTER_SHOW_MS) / LETTER_FADE_MS);
          if (alpha < 0.006) continue;

          const by  = lineWorldY(li);
          const wY  = lineScreenY(li, scrollY);
          if (wY < -LINE_HEIGHT || wY > H + LINE_HEIGHT) continue;

          const text = wrappedLines[li % wrappedLines.length];
          if (!text) continue;

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = "#111";
          ctx.lineWidth   = LINE_W;
          ctx.lineCap     = "round";
          ctx.lineJoin    = "round";

          let cx = MARGIN_X;
          for (const ch of text) {
            if (!font.glyphs[ch]) { cx += SPACE_ADV * SCALE; continue; }

            const pts = gPts(ch), lsb = gLsb(ch);
            if (pts.length > 0) {
              // Teken de letter als verbonden contourlijn → leesbaar
              ctx.beginPath();
              ctx.moveTo(cx + lsb * SCALE + pts[0][0] * SCALE, by - pts[0][1] * SCALE);
              for (let pi = 1; pi < pts.length; pi++) {
                ctx.lineTo(cx + lsb * SCALE + pts[pi][0] * SCALE, by - pts[pi][1] * SCALE);
              }
              ctx.stroke();
            }
            cx += gAdv(ch) * SCALE;
          }

          ctx.restore();
        }

        ctx.restore();
      }

      // ── Hoofdlus ──────────────────────────────────────────────────────────────
      function loop() {
        const scrollY = window.scrollY;
        const now     = performance.now();

        // Controleer welke regels nu zichtbaar zijn
        const first = Math.max(0, Math.floor((scrollY - MARGIN_TOP) / LINE_HEIGHT) - 1);
        const count = Math.ceil(H / LINE_HEIGHT) + 3;

        for (let i = 0; i < count; i++) {
          const li = first + i;
          if (li >= TOTAL_LINES || li >= wrappedLines.length) break;
          if (lineBirthTime[li] == null) {
            lineBirthTime[li] = now;
            spawnLine(li);
          }
        }

        // Update tendrils + teken segmenten op offscreen
        updateAndDraw(scrollY);

        // Kopieer offscreen naar main (zichtbaar deel)
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, W, H);
        ctx.drawImage(offscreen, 0, scrollY, W, H, 0, 0, W, H);

        // Letterlaag bovenop
        renderLetterLayer(scrollY, now);

        requestAnimationFrame(loop);
      }

      // ── Init + resize ──────────────────────────────────────────────────────────
      function initOffscreen() {
        WORLD_H = MARGIN_TOP + TOTAL_LINES * LINE_HEIGHT + 400;
        offscreen     = document.createElement("canvas");
        offscreen.width  = W;
        offscreen.height = WORLD_H;
        offCtx = offscreen.getContext("2d");
        offCtx.fillStyle = "#fff";
        offCtx.fillRect(0, 0, W, WORLD_H);
      }

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        if (font) {
          buildWrappedLines();
          lineBirthTime = {};
          spawnedLines  = {};
          tendrils      = [];
          initOffscreen();
        }
      }

      window.addEventListener("resize", resize, { passive: true });

      fetch("../fonts/nee.json").then(r => r.json()).then(f => {
        font = f;
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;

        buildWrappedLines();
        initOffscreen();

        // Scrollhoogte
        document.getElementById("scroll-space").style.height =
          (MARGIN_TOP + TOTAL_LINES * LINE_HEIGHT + 300) + "px";

        requestAnimationFrame(loop);
      });
    </script>
  </body>
</html>
