<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Diatomee — typen</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #fff; overflow: hidden; cursor: text; }
      canvas { display: block; }
      #hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: monospace;
        font-size: 11px;
        color: #bbb;
        pointer-events: none;
        text-align: center;
        line-height: 1.9;
        transition: opacity 0.4s;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="hint">
      typ om te beginnen<br>
      hoe vaker een letter gebruikt wordt, hoe meer ze uitbloeit<br>
      elke instantie groeit onafhankelijk
    </div>

    <script>
      const FONT_PATH = "../fonts/nee.json";
      const Y_MAX = 16, Y_MIN = -3, FONT_H = Y_MAX - Y_MIN;
      const SCALE    = 5.5;
      const LINE_H   = Math.round(FONT_H * SCALE * 1.62);
      const MARGIN_X = 55;
      const MARGIN_TOP = 58;
      const SPACE_ADV  = 3;

      // Keten-cellen
      const CH_RX    = 2.5;
      const CH_RY    = 0.95;
      const CH_SPACE = CH_RX * 2.08;

      // Bloei-cellen
      const BL_R     = 1.6;
      const BL_SPACE = BL_R * 2.1;

      let font = null;
      // typedChars: array van { ch, instanceLevel, displayLevel, seed }
      // instanceLevel = hoeveel keer dit teken al voorkwam op het moment van typen
      let typedChars    = [];
      let counts        = {};   // ch → totaal getypt
      let instanceCounter = 0; // unieke seed per getypt teken
      let cursorBlink   = true;
      let lastBlink     = 0;
      let glyphCache    = {};

      const canvas = document.getElementById("c");
      const ctx    = canvas.getContext("2d");
      const hint   = document.getElementById("hint");

      // ── Font helpers ─────────────────────────────────────────────────────────
      function gPts(l) { const g = font.glyphs[l]; return !g ? [] : Array.isArray(g) ? g : (g.points ?? []); }
      function gLsb(l) { const g = font.glyphs[l]; return !g ? 0 : (font.lsb?.[l] ?? (Array.isArray(g) ? 0 : (g.lsb ?? 0))); }
      function gAdv(l) {
        const g = font.glyphs[l]; if (!g) return 0;
        const pts = gPts(l);
        const rsb = font.rsb?.[l] ?? (Array.isArray(g) ? 2 : (g.rsb ?? 2));
        return gLsb(l) + (pts.length ? Math.max(...pts.map(p => p[0])) : 0) + rsb;
      }

      // ── Seeded random ────────────────────────────────────────────────────────
      function seededRand(seed) {
        let s = seed | 0;
        return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
      }

      // ── Glyph cache ──────────────────────────────────────────────────────────
      function buildGlyph(ch) {
        if (glyphCache[ch]) return glyphCache[ch];
        const pts = gPts(ch), lsb = gLsb(ch);
        const segments = [], nodes = [];
        for (let i = 0; i < pts.length; i++) {
          nodes.push({ lx: (lsb + pts[i][0]) * SCALE, ly_font: pts[i][1] });
          if (i > 0) {
            const lx0 = (lsb + pts[i-1][0]) * SCALE, ly0 = pts[i-1][1];
            const lx1 = (lsb + pts[i][0])   * SCALE, ly1 = pts[i][1];
            const len = Math.hypot(lx1 - lx0, (ly1 - ly0) * SCALE);
            if (len > 0.5) segments.push({ lx0, ly0, lx1, ly1, len, si: i });
          }
        }
        glyphCache[ch] = { segments, nodes };
        return glyphCache[ch];
      }

      // ── Halve keten ──────────────────────────────────────────────────────────
      function drawHalfChain(sx, sy, angle, maxDist, rand) {
        const kink  = (rand() - 0.5) * 4.2;
        const kFreq = 0.45 + rand() * 1.4;
        const perX  = -Math.sin(angle), perY = Math.cos(angle);
        let dist = CH_RX, i = 0;
        while (dist <= maxDist) {
          const perp = kink * Math.sin(i * kFreq * 0.55);
          const cx = sx + Math.cos(angle) * dist + perX * perp;
          const cy = sy + Math.sin(angle) * dist + perY * perp;
          const rv = 1.0 + (rand() - 0.5) * 0.22;
          ctx.save();
          ctx.translate(cx, cy); ctx.rotate(angle);
          ctx.beginPath();
          ctx.ellipse(0, 0, CH_RX * rv, CH_RY * rv, 0, 0, Math.PI * 2);
          ctx.strokeStyle = "#111"; ctx.lineWidth = 0.55; ctx.stroke();
          ctx.restore();
          dist += CH_SPACE; i++;
        }
      }

      // ── Bloei-arm ────────────────────────────────────────────────────────────
      function drawBloomArm(sx, sy, angle, armLen, rand) {
        const kink  = (rand() - 0.5) * 3.0;
        const kFreq = 0.5 + rand() * 1.3;
        const perX  = -Math.sin(angle), perY = Math.cos(angle);
        let dist = BL_R * 2.2, i = 0;
        while (dist <= armLen) {
          const perp = kink * Math.sin(i * kFreq * 0.5);
          const cx = sx + Math.cos(angle) * dist + perX * perp;
          const cy = sy + Math.sin(angle) * dist + perY * perp;
          const rv = 1.0 + (rand() - 0.5) * 0.3;
          ctx.beginPath();
          ctx.arc(cx, cy, BL_R * rv, 0, Math.PI * 2);
          ctx.strokeStyle = "#111"; ctx.lineWidth = 0.45; ctx.stroke();
          dist += BL_SPACE; i++;
        }
      }

      // ── Ster-bloei vanuit één knooppunt ───────────────────────────────────────
      function drawBloom(x, y, numArms, armLen, seed) {
        if (numArms <= 0 || armLen < BL_R) return;
        const rand = seededRand(seed * 91);
        const angleOffset = rand() * Math.PI * 2;
        for (let a = 0; a < numArms; a++) {
          const aRand   = seededRand(seed * 1000 + a * 37);
          const thisLen = armLen * (0.5 + aRand() * 0.5);
          const angle   = angleOffset + (a / numArms) * Math.PI * 2 + (aRand() - 0.5) * 0.3;
          drawBloomArm(x, y, angle, thisLen, seededRand(seed * 9999 + a));
        }
      }

      // ── Teken één letter-instantie ────────────────────────────────────────────
      // level 1   → alleen stippen (letter zichtbaar als puntenwolk)
      // level 2-4 → ketens groeien langs de stroken (letter wordt leesbaar)
      // level 5+  → ster-bloei groeit vanuit alle knooppunten
      //
      // instanceSeed: uniek per instantie → elke letter ziet er anders uit
      function drawChar(ch, ox, baselineY, level, instanceSeed) {
        const glyph = buildGlyph(ch);

        // chainT: 0 bij level 1, 1 bij level 4
        const chainT  = Math.max(0, Math.min((level - 1) / 3, 1));
        // Bloei start pas bij level 5
        const bloomL  = Math.max(0, level - 4.5);
        const numArms = Math.min(Math.floor(bloomL * 3), 24);
        const armLen  = Math.min(bloomL * 9, 110);

        // Stippen: fijn bij level 1, kleiner als ketens overnemen
        const dotR     = 1.2 - chainT * 0.3;
        const dotAlpha = 0.70 - chainT * 0.25;
        for (const nd of glyph.nodes) {
          ctx.beginPath();
          ctx.arc(ox + nd.lx, baselineY - nd.ly_font * SCALE, dotR, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,0,0,${dotAlpha.toFixed(2)})`;
          ctx.fill();
        }

        // Ketens (bidirectioneel, unieke seed per instantie)
        for (let si = 0; si < glyph.segments.length; si++) {
          const seg = glyph.segments[si];
          const x0 = ox + seg.lx0, y0 = baselineY - seg.ly0 * SCALE;
          const x1 = ox + seg.lx1, y1 = baselineY - seg.ly1 * SCALE;
          const angle   = Math.atan2(y1 - y0, x1 - x0);
          const maxDist = seg.len * 0.5 * Math.min(chainT, 1.03);
          if (maxDist >= CH_RX) {
            drawHalfChain(x0, y0, angle,           maxDist, seededRand(instanceSeed * 10007 + si * 3 + 1));
            drawHalfChain(x1, y1, angle + Math.PI, maxDist, seededRand(instanceSeed * 10007 + si * 3 + 2));
          }
        }

        // Ster-bloei (unieke seed per instantie + knooppunt-index)
        if (numArms > 0 && armLen > 0) {
          for (let ni = 0; ni < glyph.nodes.length; ni++) {
            const nd = glyph.nodes[ni];
            drawBloom(
              ox + nd.lx,
              baselineY - nd.ly_font * SCALE,
              numArms, armLen,
              instanceSeed * 997 + ni * 13
            );
          }
        }
      }

      // ── Layout: tekens → regels ───────────────────────────────────────────────
      function computeLines() {
        const maxW = canvas.width - MARGIN_X * 2;
        const lines = [[]];
        for (const item of typedChars) {
          if (item.ch === '\n') { lines.push([]); continue; }
          const line  = lines[lines.length - 1];
          const lineW = line.reduce((s, it) =>
            s + (it.ch === ' ' ? SPACE_ADV * SCALE : (font.glyphs[it.ch] ? gAdv(it.ch) * SCALE : 0)), 0);
          const chW = item.ch === ' ' ? SPACE_ADV * SCALE : (font.glyphs[item.ch] ? gAdv(item.ch) * SCALE : 0);
          if (line.length > 0 && lineW + chW > maxW) lines.push([item]);
          else line.push(item);
        }
        return lines;
      }

      // ── Render ───────────────────────────────────────────────────────────────
      let lastTime = 0;

      function draw(now) {
        requestAnimationFrame(draw);
        if (!font) return;

        const dt = Math.min(now - lastTime, 64);
        lastTime = now;

        if (now - lastBlink > 530) { cursorBlink = !cursorBlink; lastBlink = now; }

        // Animeer elke instantie afzonderlijk naar zijn eigen doelniveau
        const lerpSpeed = Math.min(dt * 0.003, 0.10);
        for (const item of typedChars) {
          if (item.ch !== ' ' && item.ch !== '\n') {
            item.displayLevel += (item.instanceLevel - item.displayLevel) * lerpSpeed;
          }
        }

        const W = canvas.width, H = canvas.height;
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H);

        if (typedChars.length === 0) return;

        const lines = computeLines();

        // Scrol omhoog als er meer regels zijn dan zichtbaar
        const maxVisible = Math.floor((H - MARGIN_TOP - 20) / LINE_H);
        const firstLine  = Math.max(0, lines.length - maxVisible);

        for (let li = firstLine; li < lines.length; li++) {
          const baselineY = MARGIN_TOP + (li - firstLine) * LINE_H + Y_MAX * SCALE;
          if (baselineY > H + LINE_H) break;

          let cx = MARGIN_X;
          for (const item of lines[li]) {
            if (item.ch === ' ' || item.ch === '\n') { cx += SPACE_ADV * SCALE; continue; }
            if (!font.glyphs[item.ch]) continue;
            drawChar(item.ch, cx, baselineY, item.displayLevel, item.seed);
            cx += gAdv(item.ch) * SCALE;
          }

          // Cursor aan het einde van de laatste regel
          if (li === lines.length - 1 && cursorBlink) {
            ctx.beginPath();
            ctx.moveTo(cx + 3, baselineY - Y_MAX * SCALE * 0.05);
            ctx.lineTo(cx + 3, baselineY + 5);
            ctx.strokeStyle = "rgba(0,0,0,0.35)"; ctx.lineWidth = 1.2; ctx.stroke();
          }
        }
      }

      // ── Toetsenbord ──────────────────────────────────────────────────────────
      window.addEventListener("keydown", e => {
        if (!font || e.metaKey || e.ctrlKey || e.altKey) return;

        if (e.key === "Backspace") {
          typedChars.pop();
          hint.style.opacity = typedChars.length === 0 ? "1" : "0";
          e.preventDefault();
          return;
        }
        if (e.key === "Enter") {
          typedChars.push({ ch: '\n', instanceLevel: 0, displayLevel: 0, seed: 0 });
          return;
        }
        if (e.key === " ") {
          typedChars.push({ ch: ' ', instanceLevel: 0, displayLevel: 0, seed: 0 });
          hint.style.opacity = "0";
          e.preventDefault();
          return;
        }

        const ch = e.key.toLowerCase();
        if (ch.length === 1 && font.glyphs[ch]) {
          counts[ch] = (counts[ch] ?? 0) + 1;
          typedChars.push({
            ch,
            instanceLevel: counts[ch],   // 1e keer → 1, 2e keer → 2, …
            displayLevel:  0,            // start bij nul, animeert omhoog
            seed: instanceCounter++,     // uniek per instantie
          });
          hint.style.opacity = "0";
        }
      });

      // ── Resize ────────────────────────────────────────────────────────────────
      window.addEventListener("resize", () => {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }, { passive: true });

      // ── Init ─────────────────────────────────────────────────────────────────
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      fetch(FONT_PATH).then(r => r.json()).then(f => {
        font = f;
        lastTime = performance.now();
        requestAnimationFrame(draw);
      });
    </script>
  </body>
</html>
