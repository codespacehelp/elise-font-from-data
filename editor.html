<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Font Editor — nee</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: monospace; background: #111; color: #ddd; }
    body { display: flex; }

    /* ── Sidebar ── */
    #sidebar {
      width: 156px;
      min-width: 156px;
      background: #1c1c1c;
      border-right: 1px solid #333;
      overflow-y: auto;
      padding: 6px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      align-content: start;
    }
    .glyph-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2px;
      border-radius: 3px;
      border: 1px solid transparent;
      cursor: pointer;
      gap: 2px;
    }
    .glyph-item:hover { background: #2a2a2a; }
    .glyph-item.active { border-color: #4a9eff; background: #0d1e3a; }
    .glyph-label { font-size: 10px; color: #555; }
    .glyph-item.active .glyph-label { color: #4a9eff; }

    /* ── Main area ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Toolbar ── */
    #toolbar {
      background: #1c1c1c;
      border-bottom: 1px solid #333;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #toolbar button {
      background: #252525;
      color: #bbb;
      border: 1px solid #444;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      white-space: nowrap;
    }
    #toolbar button:hover { background: #333; color: #fff; }
    #toolbar button.active { background: #0d2050; border-color: #4a9eff; color: #4a9eff; }
    #toolbar button:disabled { opacity: 0.35; cursor: default; }
    .sep { width: 1px; height: 22px; background: #333; margin: 0 2px; }
    #lbl-active { margin-left: auto; font-size: 12px; color: #555; }
    .inp-metric {
      width: 40px; background: #252525; color: #bbb;
      border: 1px solid #444; padding: 3px 5px;
      border-radius: 3px; font-family: monospace; font-size: 12px;
      outline: none;
    }
    .inp-metric:focus { border-color: #4a9eff; }
    .inp-global { border-color: #3a5a3a; }
    .inp-global:focus { border-color: #6bcc6b; }
    .metric-group {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; color: #bbb;
    }
    .metric-lbl-green { color: #6bcc6b; font-size: 11px; }
    .metric-lbl-red   { color: #ff6b6b; font-size: 11px; }
    .metric-lbl-blue  { color: #8ac; font-size: 11px; }

    /* ── Preview panel ── */
    #preview-panel {
      width: 280px; min-width: 200px;
      background: #1c1c1c;
      border-left: 1px solid #333;
      display: flex; flex-direction: column;
      flex-shrink: 0;
    }
    #preview-toolbar {
      padding: 8px 10px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #preview-toolbar label { font-size: 11px; color: #555; display: block; margin-bottom: 4px; }
    #preview-input {
      width: 100%; background: #252525; color: #ddd;
      border: 1px solid #444; padding: 4px 8px;
      border-radius: 3px; font-family: monospace; font-size: 13px;
      outline: none; box-sizing: border-box;
    }
    #preview-input:focus { border-color: #4a9eff; }
    #preview-canvas { flex: 1; display: block; width: 100%; }

    /* ── Canvas area ── */
    #canvas-area {
      flex: 1;
      overflow: auto;
      padding: 12px;
      background: #111;
    }
    #editor-canvas { display: block; cursor: crosshair; }

    /* ── JSON panel ── */
    #json-panel {
      border-top: 1px solid #333;
      background: #1c1c1c;
      padding: 6px 10px;
      display: flex;
      gap: 8px;
      align-items: stretch;
      flex-shrink: 0;
    }
    #json-output {
      flex: 1;
      height: 80px;
      background: #0a0a0a;
      color: #5bf;
      border: 1px solid #333;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 11px;
      resize: vertical;
      border-radius: 3px;
      outline: none;
    }
    #json-output:focus { border-color: #4a9eff; }
    #json-buttons { display: flex; flex-direction: column; gap: 5px; }
    #json-buttons button {
      background: #252525; color: #bbb; border: 1px solid #444;
      padding: 4px 12px; border-radius: 3px; cursor: pointer;
      font-family: monospace; font-size: 12px;
    }
    #json-buttons button:hover { background: #333; color: #fff; }
  </style>
</head>
<body>
  <aside id="sidebar"></aside>

  <div id="main">
    <div id="toolbar">
      <button id="btn-add" class="active" title="Shortcut: P">✏ Add</button>
      <button id="btn-move" title="Shortcut: V">⊹ Select</button>
      <div class="sep"></div>
      <button id="btn-undo" disabled title="Cmd/Ctrl+Z">↩ Undo</button>
      <button id="btn-redo" disabled title="Cmd/Ctrl+Shift+Z">↪ Redo</button>
      <button id="btn-save" title="Opslaan (Cmd/Ctrl+S)">💾 Save</button>
      <div class="sep"></div>
      <div class="metric-group">
        <span class="metric-lbl-green">Links:</span>
        <input id="inp-lsb" class="inp-metric" type="number" min="-5" max="20" value="0" title="Linker zijlijn (left side bearing)">
        <span class="metric-lbl-red">Rechts:</span>
        <input id="inp-rsb" class="inp-metric" type="number" min="0" max="20" value="2" title="Rechter zijlijn (right side bearing)">
      </div>
      <div class="sep"></div>
      <div class="metric-group">
        <span class="metric-lbl-blue">x-h:</span>
        <input id="inp-xheight" class="inp-metric inp-global" type="number" min="1" max="16" value="9" title="x-hoogte (globaal voor alle letters)">
      </div>
      <span id="lbl-active">Editing: a</span>
    </div>

    <div id="canvas-area">
      <canvas id="editor-canvas"></canvas>
    </div>

    <div id="json-panel">
      <textarea id="json-output" spellcheck="false"></textarea>
      <div id="json-buttons">
        <button id="btn-copy">Copy JSON</button>
        <button id="btn-load">Load JSON</button>
      </div>
    </div>
  </div>

  <aside id="preview-panel">
    <div id="preview-toolbar">
      <label for="preview-input">Preview tekst</label>
      <input id="preview-input" type="text" placeholder="Type letters..." value="abcde">
    </div>
    <canvas id="preview-canvas"></canvas>
  </aside>

  <script src="editor.js" type="module"></script>
</body>
</html>
